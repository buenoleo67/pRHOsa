name: Deploy pRHosa to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore dependencies
        run: dotnet restore ./pRHosaApp1.csproj

      - name: Publish Blazor WebAssembly
        run: dotnet publish ./pRHosaApp1.csproj -c Release

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --dir=bin/Release/net9.0/publish/wwwroot --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
